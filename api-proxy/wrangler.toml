# ============================================
# SORCERY PORTAL BRASIL - CLOUDFLARE WORKER CONFIG
# ============================================

name = "sorcery-api-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Configurações de produção
[env.production]
name = "sorcery-api-proxy"
route = "api.sorcery-portal.com.br/*"

# Variáveis de ambiente (configure no dashboard do Cloudflare)
# NÃO coloque secrets aqui - use o dashboard
[vars]
ALLOWED_ORIGINS = "https://koddaai.github.io,https://sorcery-portal.com.br"

# Para desenvolvimento local
[env.development]
name = "sorcery-api-proxy-dev"

[env.development.vars]
ALLOWED_ORIGINS = "http://localhost:8080,http://127.0.0.1:8080"

# Rate limiting com Durable Objects (opcional, mais robusto)
# [[durable_objects.bindings]]
# name = "RATE_LIMITER"
# class_name = "RateLimiter"

# KV para cache (opcional)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"
