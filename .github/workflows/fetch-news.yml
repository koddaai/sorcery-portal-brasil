name: Fetch and Translate Sorcery News

on:
  schedule:
    # Runs at 8:00 and 20:00 UTC (5:00 and 17:00 BRT)
    - cron: '0 8,20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./scripts

      - name: Fetch and translate news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node fetch-news.js
        working-directory: ./scripts

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet news-database.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add news-database.json
          git commit -m "chore: update news database [skip ci]"
          git push
